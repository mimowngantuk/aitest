<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Style Maker ✨</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    color:white;
    background:url("wallpaper.jpg");
    background-size:cover;
    background-position:center;
    height:100vh;
    overflow:hidden;
}

/* intro screen */
#intro{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:10;
}

/* image fade */
#previewImage{
    opacity:0;
    transition:0.5s;
}
#previewImage.show{
    opacity:1;
}

/* main layout */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* glass panel */
.panel{
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    padding:40px;
    border-radius:30px;
    transform:skewX(-8deg);
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

/* fix skew text */
.panel *{
    transform:skewX(8deg);
}

/* buttons */
button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    background:rgba(255,255,255,0.7);
    color:#333;
    font-weight:bold;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
}

/* preview section */
.preview-section{
    display:flex;
    gap:40px;
    margin-top:30px;
    justify-content:center;
}

/* image preview */
.image-preview img{
    width:250px;
    border-radius:25px;
    margin-top:10px;
    transform:skewX(8deg);
    object-fit:cover;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* recommendation box */
.recommendation{
    width:250px;
    opacity:0;
    transform:translateX(100px);
    transition:0.8s;
}
.recommendation.show{
    opacity:1;
    transform:translateX(0);
}

.model-review img{
    width:120px;
    border-radius:15px;
    margin-top:10px;
}

/* loading text */
#loadingText{
    font-size:12px;
    opacity:0.8;
    margin-top:10px;
    animation: blink 1.5s infinite;
}

#colorTheory h3{
    margin-bottom:5px;
}
#colorTheory p{
    margin:3px 0;
    font-size:13px;
}

@keyframes blink{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
<script src="colorTheory.js"></script>

</head>

<body>

<!-- intro -->
<div id="intro" onclick="startApp()">
<h1>Kelompok 5</h1>
<div style="line-height:1.8; margin-top:15px;">
- Regina Maheswari Nathania (35)<br>
- Mirelle Naurin Rasya (22)<br>
- Naumira Farras Sakhi (30)<br>
- Muhammad Naufal Ikram (26)<br>
- Muhammad Quraisy Dhinezad (28)<br>
- Zidane Muhammad Faris (39)
</div>
<p style="margin-top:30px; opacity:0.7;">klik untuk lanjut</p>
</div>

<!-- main web -->
<div class="container">
<div class="panel">
<h1>Style Maker ✨</h1>

<button onclick="openCamera()">Open Camera</button>

<input type="file" id="upload" accept="image/*" hidden>
<button onclick="document.getElementById('upload').click()">
Upload Picture
</button>

<div class="preview-section">

<div class="image-preview">
<img id="previewImage">
<div id="colorTheory"></div>
</div>

<div class="recommendation" id="recommendationBox">
<h3>Recommended Style</h3>
<p id="recommendText"></p>

<div class="model-review">
<img src="https://i.imgur.com/8Km9tLL.png">
</div>

<div id="loadingText" style="display:none;">
Analyzing outfit...
</div>

</div>
</div>
</div>
</div>

<script>

let colorModel, outfitModel;
let modelsReady = false;

window.onload = async function(){
    colorModel = await tmImage.load("color/model.json", "color/metadata.json");
    outfitModel = await tmImage.load("outfit/model.json", "outfit/metadata.json");
    modelsReady = true;
    console.log("Models Loaded");
}

function startApp(){
    document.getElementById("intro").style.display="none"
}

const uploadInput = document.getElementById("upload")
const previewImage = document.getElementById("previewImage")
const recommendationBox = document.getElementById("recommendationBox")
const colorTheory = document.getElementById("colorTheory")
const recommendText = document.getElementById("recommendText")
const loadingText = document.getElementById("loadingText")

uploadInput.addEventListener("change", function(event){

    const file = event.target.files[0]

    if(file){
        const reader = new FileReader()

        reader.onload = function(e){
            previewImage.src = e.target.result

            previewImage.onload = function(){
                previewImage.classList.add("show")
                simulateAI()
            }
        }

        reader.readAsDataURL(file)
    }
})

function openCamera(){
    alert("camera feature coming soon")
}

async function simulateAI(){

    if(!modelsReady){
        alert("Model masih loading...");
        return;
    }

    loadingText.style.display="block";

    const predictionColor = await colorModel.predict(previewImage);
    const predictionOutfit = await outfitModel.predict(previewImage);

    loadingText.style.display="none";

    let bestColor = predictionColor[0];
    for(let i=1; i<predictionColor.length; i++){
        if(predictionColor[i].probability > bestColor.probability){
            bestColor = predictionColor[i];
        }
    }

    let bestOutfit = predictionOutfit[0];
    for(let i=1; i<predictionOutfit.length; i++){
        if(predictionOutfit[i].probability > bestOutfit.probability){
            bestOutfit = predictionOutfit[i];
        }
    }

    let color = bestColor.className;
    let outfit = bestOutfit.className;

    const theory = getColorTheory(color);

    colorTheory.innerHTML = `
    <h3>${theory.title} - ${outfit}</h3>
    <p>${theory.desc}</p>
    <p>Color: ${(bestColor.probability*100).toFixed(1)}%</p>
    <p>Outfit: ${(bestOutfit.probability*100).toFixed(1)}%</p>
    `;

    if(color=="black"){
        recommendText.innerHTML=`Grey/Black pants, White sneakers, Beanie`;
    }
    else if(color=="white"){
        recommendText.innerHTML=`Light jeans, White sneakers, Beige cap`;
    }
    else if(color=="blue"){
        recommendText.innerHTML=`Black jeans, White sneakers, Navy cap`;
    }
    else if(color=="yellow"){
        recommendText.innerHTML=`Black/Brown pants, White sneakers`;
    }
    else if(color=="pink"){
        recommendText.innerHTML=`White/Light grey pants, Clean sneakers`;
    }
    else{
        recommendText.innerHTML=`Neutral outfit`;
    }

    recommendationBox.classList.add("show");
}

</script>

</body>
</html>
